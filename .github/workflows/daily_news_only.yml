name: 全球财经+分红扫描+个股利好利空 分段防截断推送
on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  send_news:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖包
        run: |
          pip install requests beautifulsoup4 lxml fake-useragent translate akshare
          
      - name: 执行分段推送脚本
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          cat >< 'EOF'
          import requests
          import random
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator
          import warnings
          warnings.filterwarnings("ignore")

          # 基础配置
          WEBHOOK_URL = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          translator = Translator(to_lang="zh")

          # 请求头设置
          def get_headers():
              try:
                  return {"User-Agent": UserAgent().random}
              except:
                  return {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          # 国内新浪财经新闻抓取
          def fetch_sina_news():
              news_list = []
              urls = [
                  "https://finance.sina.com.cn/world/",
                  "https://finance.sina.com.cn/macro/",
                  "https://finance.sina.com.cn/money/forex/forexnews.shtml"
              ]
              for url in urls:
                  try:
                      res = requests.get(url, headers=get_headers(), timeout=15, verify=False)
                      res.encoding = "utf-8"
                      soup = BeautifulSoup(res.text, "lxml")
                      for a in soup.find_all("a"):
                          title = a.get_text(strip=True)
                          if< len(title< 80 and "视频" not in title and "直播" not in title:
                              if any(key in title for key in ["美联储", "美股", "原油", "黄金", "汇率", "CPI", "央行", "PMI"]):
                                  news_list.append(f"{TODAY} {title}")
                  except Exception:
                      continue
              return list(set(news_list))[:12]

          # 路透社新闻抓取+翻译
          def fetch_reuters():
              res_list = []
              try:
                  res = requests.get("https://www.reuters.com/business/", headers=get_headers(), timeout=15)
                  soup = BeautifulSoup(res.text, "lxml")
                  for item in soup.select("article h3")[:8]:
                      title = item.get_text(strip=True)
                      if len(title) < 15:
                          continue
                      try:
                          cn_title = translator.translate(title)
                          res_list.append(f"{TODAY} {cn_title}（引自路透社）")
                      except Exception:
                          res_list.append(f"{TODAY} {title}（引自路透社）")
              except Exception:
                  pass
              return res_list

          # CNBC新闻抓取+翻译
          def fetch_cnbc():
              res_list = []
              try:
                  res = requests.get("https://www.cnbc.com/economy/", headers=get_headers(), timeout=15)
                  soup = BeautifulSoup(res.text, "lxml")
                  for item in soup.select(".Card-title")[:8]:
                      title = item.get_text(strip=True)
                      if len(title)< 15:
                          continue
                      try:
                          cn_title = translator.translate(title)
                          res_list.append(f"{TODAY} {cn_title}（引自CNBC）")
                      except Exception:
                          res_list.append(f"{TODAY} {title}（引自CNBC）")
              except Exception:
                  pass
              return res_list

          # 彭博社新闻抓取+翻译
          def fetch_bloomberg():
              res_list = []
              try:
                  res = requests.get("https://www.bloomberg.com/economics", headers=get_headers(), timeout=15)
                  soup = BeautifulSoup(res.text, "lxml")
                  for item in soup.select("a[href*='news'] h3")[:8]:
                      title = item.get_text(strip=True)
                     < 15:
                          continue
                      try:
                          cn_title = translator.translate(title)
                          res_list.append(f"{TODAY} {cn_title}（引自彭博社）")
                      except Exception:
                          res_list.append(f"{TODAY} {title}（引自彭博社）")
              except Exception:
                  pass
              return res_list

          # 拼接第一段内容：全球财经要闻
          def build_part1():
              global_news = fetch_sina_news() + fetch_reuters() + fetch_cnbc() + fetch_bloomberg()
              global_news = list(dict.fromkeys(global_news))[:25]
              
              # 时段标题
              hour = datetime.now().hour
              if 7< 12:
                  title = "【第一部分｜早间全球财经要闻】"
              elif 12< 18:
                  title = "【第一部分｜午间全球财经要闻】"
              else:
                  title = "【第一部分｜晚间全球财经要闻】"
              
              content = [title]
              for idx, news in enumerate(global_news, 1):
                  content.append(f"{idx}. {news}")
              return "\n".join(content)

          # 发送第一段消息
          def send_part1():
              content = build_part1()
              try:
                  requests.post(WEBHOOK_URL, json={
                      "msg_type": "text",
                      "content": {"text": content}
                  }, timeout=20)
                  print("✅ 第一部分推送成功")
              except Exception as e:
                  print("❌ 第一部分推送失败")

          if __name__ == "__main__":
              send_part1()
          EOF
          
          # 运行第一段脚本
          python push_part1.py
          
          
          # --------------- 第二段：分红扫描+个股利好利空 ---------------
