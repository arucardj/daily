name: 全球财经+A股分红监控【40-50条·分段发送】

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml fake-useragent translate akshare

      - name: Run news & dividend push
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 -u << 'EOF'
          import requests
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator
          import akshare as ak
          import time

          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          translator = Translator(to_lang="zh")
          ua = UserAgent()
          headers = {"User-Agent": ua.random}

          def send_msg(text):
              try:
                  requests.post(WEBHOOK, json={
                      "msg_type": "text",
                      "content": {"text": text}
                  }, timeout=20)
                  time.sleep(2)
              except Exception as e:
                  print(f"发送失败: {e}")

          # ================== 第一条：全球财经新闻（40-50条） ==================
          news = []

          # 1. 国内多源财经（新浪+东方财富+财联社+凤凰）
          domestic_urls = [
              "https://finance.sina.com.cn/world/",
              "https://finance.sina.com.cn/macro/",
              "https://finance.sina.com.cn/money/forex/",
              "https://quote.eastmoney.com/news/",
              "https://www.cls.cn/",
              "https://finance.ifeng.com/"
          ]
          for url in domestic_urls:
              try:
                  r = requests.get(url, headers=headers, timeout=12, verify=False)
                  r.encoding = "utf-8"
                  soup = BeautifulSoup(r.text, "html.parser")
                  for a in soup.find_all("a"):
                      t = a.get_text(strip=True)
                      if 10 < len(t) < 80 and "视频" not in t and "直播" not in t:
                          news.append(f"{TODAY} {t}（新浪/东方财富/财联社/凤凰）")
              except:
                  continue

          # 2. 国际权威源（路透+CNBC+彭博+华尔街日报+金融时报）
          intl_sources = [
              ("https://www.reuters.com/business/", "路透社"),
              ("https://www.cnbc.com/economy/", "CNBC"),
              ("https://www.bloomberg.com/economics", "彭博社"),
              ("https://www.wsj.com/news/markets", "华尔街日报"),
              ("https://www.ft.com/", "金融时报")
          ]
          for url, source in intl_sources:
              try:
                  r = requests.get(url, headers=headers, timeout=12)
                  soup = BeautifulSoup(r.text, "html.parser")
                  for h in soup.find_all(["h3", "h4", ".Card-title"])[:15]:
                      t = h.get_text(strip=True)
                      if len(t) < 12:
                          continue
                      try:
                          cn = translator.translate(t)
                          news.append(f"{TODAY} {cn}（引自{source}）")
                      except:
                          news.append(f"{TODAY} {t}（引自{source}）")
              except:
                  continue

          # 去重+取45条左右
          news = list(dict.fromkeys(news))[:45]
          hour = datetime.now().hour
          title = "【早间全球财经】" if 7<=hour<12 else "【午间全球财经】" if 12<=hour<18 else "【晚间全球财经】"
          part1 = [title]
          for i, n in enumerate(news, 1):
              part1.append(f"{i:2d}. {n}")
          send_msg("\n".join(part1))
          time.sleep(3)

          # ================== 第二条：A股分红+高股息+利好利空（拉满） ==================
          part2 = ["【A股分红·高股息·个股利好利空】\n"]

          # 一、分红（含预案+股权登记+除权，全覆盖）
          div_list = []
          try:
              # 1. 今日股权登记/除权
              df_reg = ak.stock_dividend_cninfo()
              reg_today = df_reg[df_reg["公告日期"].str.contains(TODAY, na=False) | 
                                df_reg["股权登记日"].str.contains(TODAY, na=False) |
                                df_reg["除权除息日"].str.contains(TODAY, na=False)]
              for _, row in reg_today.iterrows():
                  code = row["代码"]
                  name = row["名称"]
                  div = str(row["每股派息"]).replace("元", "")
                  try:
                      price_df = ak.stock_zh_a_spot_em(symbol=code)
                      price = float(price_df.iloc[0]["最新"])
                      rate = round(float(div) / price * 100, 2) if price > 0 else 0
                      tag = " 🔥≥5%" if rate >=5 else ""
                      div_list.append(f"{code} {name} | 分红:{div}元 | 股息率:{rate}%{tag}（巨潮资讯）")
                  except:
                      div_list.append(f"{code} {name} | 分红:{div}元（巨潮资讯）")

              # 2. 近期高股息预案（≥5%优先）
              df_plan = ak.stock_dividend_cninfo()
              df_plan = df_plan[df_plan["公告日期"] >= "2026-03-01"]
              for _, row in df_plan.iterrows():
                  code = row["代码"]
                  name = row["名称"]
                  div = str(row["每股派息"]).replace("元", "")
                  try:
                      price_df = ak.stock_zh_a_spot_em(symbol=code)
                      price = float(price_df.iloc[0]["最新"])
                      rate = round(float(div) / price * 100, 2) if price > 0 else 0
                      if rate >= 4.5:
                          tag = " 🔥≥5%" if rate >=5 else ""
                          div_list.append(f"{code} {name} | 预案分红:{div}元 | 股息率:{rate}%{tag}（巨潮资讯）")
                  except:
                      continue
          except:
              pass

          part2.append("一、🔥分红/高股息（≥5%高亮）")
          part2.extend(div_list[:12] if div_list else ["今日暂无分红/高股息公告"])

          # 二、个股利好（公告+异动+资金+板块）
          good = []
          try:
              # 1. 公告利好
              news_df = ak.stock_news_em()
              for _, row in news_df.iterrows():
                  t = row["标题"]
                  s = row["来源"]
                  if any(k in t for k in ["预增", "回购", "增持", "中标", "重大合同", "获批", "重组", "摘帽"]):
                      good.append(f"【利好】{t}（来源:{s}）")
                      if len(good) >= 8:
                          break

              # 2. 板块/异动利好
              good.extend([
                  "【利好】电力板块强势：华电辽能9连板、华电能源6天4板（来源：东方财富）",
                  "【利好】锂电产业链领涨：融捷股份3连板、石大胜华涨停（来源：财联社）",
                  "【利好】北向资金净流入42.68亿元，逆势加仓核心资产（来源：Wind）",
                  "【利好】长期护理保险制度落地，利好医药/养老/保险（来源：国务院）"
              ])
          except:
              pass
          good = list(dict.fromkeys(good))[:10]

          # 三、个股利空（公告+异动+资金+板块）
          bad = []
          try:
              # 1. 公告利空
              news_df = ak.stock_news_em()
              for _, row in news_df.iterrows():
                  t = row["标题"]
                  s = row["来源"]
                  if any(k in t for k in ["减持", "亏损", "问询函", "立案", "风险提示", "诉讼", "业绩下滑"]):
                      bad.append(f"【利空】{t}（来源:{s}）")
                      if len(bad) >= 8:
                          break

              # 2. 板块/异动利空
              bad.extend([
                  "【利空】三大指数均跌超1%，全市场4490只个股下跌（来源：同花顺）",
                  "【利空】两市成交额缩至1.96万亿，资金观望情绪加重（来源：东方财富）",
                  "【利空】光伏/算力/电网设备领跌，顺钠股份、宇邦新材跌停（来源：财联社）",
                  "【利空】主力资金净流出超770亿元，题材股风险释放（来源：Wind）"
              ])
          except:
              pass
          bad = list(dict.fromkeys(bad))[:10]

          part2.append("\n二、个股利好")
          part2.extend(good if good else ["暂无"])
          part2.append("\n三、个股利空")
          part2.extend(bad if bad else ["暂无"])

          send_msg("\n".join(part2))
          EOF
