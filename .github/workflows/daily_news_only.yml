name: 国内40+国际40·当月分红≥4%·个股利好利空·Gemini评述【全自动飞书推送】

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 北京时间 08:00
    - cron: '0 4 * * 1-5'   # 北京时间 12:00
    - cron: '0 10 * * 1-5'  # 北京时间 18:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml fake-useragent google-generativeai akshare pandas

      - name: 执行全自动分析推送
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -u << 'EOF'
          import requests, time, akshare as ak, pandas as pd, re
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          import google.generativeai as genai

          # ================== 配置 ==================
          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          GEMINI_KEY = "${{ secrets.GEMINI_API_KEY }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          MONTH = datetime.now().month
          YEAR = datetime.now().year
          START_DATE = f"{YEAR}-{MONTH:02d}-01"
          headers = {"User-Agent": UserAgent().random}

          # Gemini 初始化
          genai.configure(api_key=GEMINI_KEY)
          gemini = genai.GenerativeModel("gemini-2.5-flash")

          # ================== 飞书发送 ==================
          def send(text):
              try:
                  requests.post(WEBHOOK, json={
                      "msg_type": "text",
                      "content": {"text": text[:3072]}
                  }, timeout=20)
                  time.sleep(4)
              except Exception as e:
                  print("发送失败:", e)

          # ================== Gemini 总结点评 ==================
          def ai_summary(prompt):
              try:
                  res = gemini.generate_content(prompt)
                  return res.text.strip()
              except:
                  return "AI 总结暂时不可用"

          # ================== 1. 国内新闻40条（高质量） ==================
          def domestic_news():
              news = []
              sites = [
                  ("https://www.stcn.com/", "证券时报"),
                  ("https://www.cs.com.cn/", "中国证券报"),
                  ("https://finance.eastmoney.com/", "东方财富"),
                  ("https://www.cls.cn/", "财联社"),
              ]
              for url, name in sites:
                  try:
                      r = requests.get(url, headers=headers, timeout=10, verify=False)
                      r.encoding = "utf-8"
                      soup = BeautifulSoup(r.text, "lxml")
                      for a in soup.find_all("a"):
                          t = a.get_text(strip=True)
                          if 12 < len(t) < 90 and all(x not in t for x in ["视频", "直播", "图片", "下载"]):
                              news.append(f"【{name}】{t}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 2. 国际新闻40条（翻译准确） ==================
          def global_news():
              news = []
              sites = [
                  ("https://www.reuters.com/business", "路透社"),
                  ("https://www.bbc.com/news/business", "BBC"),
                  ("https://www.bloomberg.com/markets", "彭博"),
                  ("https://www.cnbc.com/economy/", "CNBC"),
              ]
              for url, name in sites:
                  try:
                      r = requests.get(url, headers=headers, timeout=10)
                      soup = BeautifulSoup(r.text, "lxml")
                      for h in soup.find_all(["h2", "h3", "h4"]):
                          t = h.get_text(strip=True)
                          if len(t) < 10 or len(t) > 120:
                              continue
                          try:
                              cn = ai_summary(f"翻译成精准中文，只输出结果：{t}")
                              news.append(f"【{name}】{cn}")
                          except:
                              news.append(f"【{name}】{t}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 3. 当月分红 ≥4%（自然月 1日→今日，官方巨潮数据） ==================
          def dividends():
              res = []
              try:
                  df = ak.stock_dividend_cninfo()
                  df["公告日期"] = pd.to_datetime(df["公告日期"], errors="coerce")
                  df = df[df["公告日期"] >= START_DATE]
                  price_df = ak.stock_zh_a_spot_em().set_index("代码")

                  for _, row in df.iterrows():
                      code = row["代码"]
                      name = row["名称"]
                      div = pd.to_numeric(row["每股派息"], errors="coerce")

                      if pd.isna(div) or div <= 0:
                          continue
                      if code not in price_df.index:
                          continue
                      p = price_df.loc[code, "最新"]
                      if p <= 0:
                          continue
                      rate = round((div / p) * 100, 2)
                      if rate >= 4:
                          tag = "🔥" if rate >=5 else ""
                          res.append(f"{code} {name} | 派息:{div}元 | 股息率:{rate}%{tag}")

              except:
                  pass
              return list(dict.fromkeys(res))[:30]

          # ================== 4. 个股利好利空（精确到股票） ==================
          def stock_news():
              good = []
              bad = []
              try:
                  df = ak.stock_news_em(symbol="")
                  df["发布时间"] = pd.to_datetime(df["发布时间"], errors="coerce")
                  df = df[df["发布时间"] >= f"{YEAR}-{MONTH:02d}-01"]

                  for _, row in df.iterrows():
                      code = row["股票代码"]
                      name = row["股票简称"]
                      title = row["标题"]

                      if not code or len(code)!=6:
                          continue

                      if any(x in title for x in ["涨停", "利好", "增长", "中标", "回购", "增持", "获批"]):
                          good.append(f"{code} {name}｜{title}")
                      if any(x in title for x in ["跌停", "亏损", "处罚", "立案", "减持", "风险", "暴跌"]):
                          bad.append(f"{code} {name}｜{title}")

              except:
                  pass
              return good[:20], bad[:20]

          # ================== 主执行 ==================
          if __name__ == "__main__":
              # 国内新闻
              dom = domestic_news()
              t1 = [f"📢【国内财经大新闻 40条 {TODAY}】"]
              for i, n in enumerate(dom[:40],1):
                  t1.append(f"{i}. {n}")
              send("\n".join(t1))

              time.sleep(2)

              # 国际新闻
              glo = global_news()
              t2 = [f"🌍【国际财经大新闻 40条 {TODAY}】"]
              for i, n in enumerate(glo[:40],1):
                  t2.append(f"{i}. {n}")
              send("\n".join(t2))

              time.sleep(2)

              # AI 总结今日全球市场影响
              gtext = "\n".join(glo[:15])
              aicom = ai_summary(f"以下是今日全球财经新闻，请用简短专业的口吻总结：重点、影响、观点、股市可能影响。\n{gtext}")
              send(f"🤖【Gemini 全球市场今日评述】\n{aicom}")

              time.sleep(2)

              # 当月高分红
              divs = dividends()
              t3 = [f"💰【{YEAR}年{MONTH}月 高股息分红 ≥4%（官方巨潮）】"]
              if divs:
                  for i, item in enumerate(divs,1):
                      t3.append(f"{i}. {item}")
              else:
                  t3.append("暂无符合条件公告")
              send("\n".join(t3))

              time.sleep(2)

              # 个股利好利空
              good, bad = stock_news()
              t4 = [f"✅【沪深A股 个股利好（本月）】"]
              for i, it in enumerate(good[:15],1):
                  t4.append(f"{i}. {it}")
              send("\n".join(t4))

              time.sleep(2)

              t5 = [f"⚠️【沪深A股 个股利空（本月）】"]
              for i, it in enumerate(bad[:15],1):
                  t5.append(f"{i}. {it}")
              send("\n".join(t5))

              time.sleep(2)

              # AI 点评个股事件影响
              gtext2 = "\n".join(good[:8] + bad[:8])
              aicom2 = ai_summary(f"以下是个股利好利空，请简短点评影响、风险、机会。\n{gtext2}")
              send(f"🤖【Gemini 个股事件点评】\n{aicom2}")
          EOF
