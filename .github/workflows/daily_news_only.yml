name: 国内40+国际40+BBC+全阶段分红预案+利好利空【每日3次】

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml fake-useragent translate akshare

      - name: Run full news & dividend push
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          import requests
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator
          import akshare as ak
          import time

          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          translator = Translator(to_lang="zh")
          ua = UserAgent()
          headers = {"User-Agent": ua.random}

          def send_msg(text):
              try:
                  requests.post(WEBHOOK, json={
                      "msg_type": "text",
                      "content": {"text": text}
                  }, timeout=20)
                  time.sleep(2)
              except:
                  pass

          # ================== 第一条：国内新闻 40条 ==================
          domestic = []
          sources_cn = [
              ("https://www.stcn.com/", "证券时报"),
              ("https://www.cls.cn/", "财联社"),
              ("https://www.cs.com.cn/", "中国证券报"),
              ("https://finance.sina.com.cn/", "新浪财经"),
              ("https://quote.eastmoney.com/news/", "东方财富"),
              ("https://www.ce.cn/", "中国经济网"),
              ("https://www.caixin.com/", "财新网")
          ]
          for url, name in sources_cn:
              try:
                  r = requests.get(url, headers=headers, timeout=10, verify=False)
                  r.encoding = "utf-8"
                  soup = BeautifulSoup(r.text, "html.parser")
                  for a in soup.find_all("a"):
                      t = a.get_text(strip=True)
                      if 12 < len(t) < 80 and "视频" not in t:
                          domestic.append(f"{TODAY} {t}（{name}）")
              except:
                  continue
          domestic = list(dict.fromkeys(domestic))[:40]
          part1 = ["【国内财经新闻 40条】"]
          for i, x in enumerate(domestic, 1):
              part1.append(f"{i:2d}. {x}")
          send_msg("\n".join(part1))
          time.sleep(3)

          # ================== 第二条：国际新闻 40条（含BBC） ==================
          foreign = []
          sources_global = [
              ("https://www.bbc.com/news/business", "BBC Business"),
              ("https://www.reuters.com/business/", "路透社"),
              ("https://www.bloomberg.com/economics", "彭博社"),
              ("https://www.wsj.com/news/markets", "华尔街日报"),
              ("https://www.ft.com/", "金融时报"),
              ("https://www.cnbc.com/economy/", "CNBC"),
              ("https://www.marketwatch.com/", "MarketWatch")
          ]
          for url, name in sources_global:
              try:
                  r = requests.get(url, headers=headers, timeout=10)
                  soup = BeautifulSoup(r.text, "html.parser")
                  for h in soup.find_all(["h3","h4"]):
                      t = h.get_text(strip=True)
                      if len(t) < 10: continue
                      try:
                          cn = translator.translate(t)
                          foreign.append(f"{TODAY} {cn}（{name}）")
                      except:
                          foreign.append(f"{TODAY} {t}（{name}）")
              except:
                  continue
          foreign = list(dict.fromkeys(foreign))[:40]
          part2 = ["【国际财经新闻 40条（BBC/路透/彭博）】"]
          for i, x in enumerate(foreign, 1):
              part2.append(f"{i:2d}. {x}")
          send_msg("\n".join(part2))
          time.sleep(3)

          # ================== 第三条：全阶段分红 + 利好利空 ==================
          part3 = ["【A股全阶段分红监控·预案→实施·高股息高亮】\n"]

          div_list = []
          try:
              df = ak.stock_dividend_cninfo()
              recent7 = (datetime.now() - timedelta(7)).strftime("%Y-%m-%d")
              df_recent = df[df["公告日期"] >= recent7]

              for _, row in df_recent.iterrows():
                  code = row["代码"]
                  name = row["名称"]
                  div = str(row["每股派息"]).replace("元", "")
                  typ = row["公告类型"] if "公告类型" in row else ""

                  tag_type = ""
                  if "预案" in str(typ):
                      tag_type = "【董事会预案】"
                  elif "实施" in str(typ) or "股权登记" in str(typ) or "除权" in str(typ):
                      tag_type = "【实施/登记/除权】"
                  else:
                      tag_type = "【分红公告】"

                  try:
                      price_df = ak.stock_zh_a_spot_em(symbol=code)
                      price = float(price_df.iloc[0]["最新"])
                      rate = round(float(div) / price * 100, 2) if price > 0 else 0
                      high = " 🔥≥5%" if rate >= 5 else ""
                      div_list.append(f"{code} {name} | {tag_type} 分红:{div}元 股息率:{rate}%{high}（巨潮）")
                  except:
                      div_list.append(f"{code} {name} | {tag_type} 分红:{div}元（巨潮）")

              # 重点高股息强制显示
             重点 = [
                  ("601628", "中国人寿", "【预案】每股0.618元"),
                  ("300750", "宁德时代", "【预案】10派69.57元"),
                  ("601088", "中国神华", "【高股息】长期稳定分红"),
                  ("601318", "中国平安", "【年度分红预案】")
              ]
              for c, n, d in 重点:
                  div_list.append(f"{c} {n} | {d}（重点监控）")

          except:
              div_list = ["数据获取中，不影响行情判断"]

          part3.append("一、🔥全阶段分红（预案→实施，≥5%高亮）")
          part3.extend(list(dict.fromkeys(div_list))[:20])

          # 利好
          good = []
          try:
              news_df = ak.stock_news_em()
              for _, row in news_df.iterrows():
                  t = row["标题"]
                  s = row["来源"]
                  if any(k in t for k in ["预增", "回购", "增持", "中标", "合同", "获批", "重组"]):
                      good.append(f"【利好】{t}（{s}）")
                  if len(good) >= 10: break
          except:
              good = ["暂无"]

          # 利空
          bad = []
          try:
              news_df = ak.stock_news_em()
              for _, row in news_df.iterrows():
                  t = row["标题"]
                  s = row["来源"]
                  if any(k in t for k in ["减持", "亏损", "问询", "立案", "风险", "下滑"]):
                      bad.append(f"【利空】{t}（{s}）")
                  if len(bad) >= 10: break
          except:
              bad = ["暂无"]

          part3.append("\n二、个股利好")
          part3.extend(good)
          part3.append("\n三、个股利空")
          part3.extend(bad)

          send_msg("\n".join(part3))
          EOF
