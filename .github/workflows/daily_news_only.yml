name: 国内40+国际40·当月分红≥4%·个股利好利空·黄金原油·Gemini评述【低耗稳定版】

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 北京时间 08:00
    - cron: '0 4 * * 1-5'   # 北京时间 12:00
    - cron: '0 10 * * 1-5'  # 北京时间 18:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml fake-useragent google-generativeai akshare pandas

      - name: 执行推送
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -u << 'EOF'
          import requests, time, akshare as ak, pandas as pd
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          import google.generativeai as genai

          # ================== 配置 ==================
          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          GEMINI_KEY = "${{ secrets.GEMINI_API_KEY }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          MONTH = datetime.now().month
          YEAR = datetime.now().year
          START_DATE = f"{YEAR}-{MONTH:02d}-01"
          headers = {"User-Agent": UserAgent().random}

          # Gemini 初始化（稳定版）
          genai.configure(api_key=GEMINI_KEY)
          gemini = genai.GenerativeModel("gemini-1.5-flash")

          # ================== 飞书发送 ==================
          def send(text):
              try:
                  requests.post(WEBHOOK, json={
                      "msg_type": "text",
                      "content": {"text": text[:3000]}
                  }, timeout=20)
                  time.sleep(3)
              except Exception as e:
                  print("发送失败:", e)

          # ================== AI 总结（低频率调用） ==================
          def ai_summary(prompt):
              for _ in range(3):
                  try:
                      res = gemini.generate_content(prompt, request_options={"timeout": 45})
                      return res.text.strip() if res.text else "AI 暂时不可用"
                  except:
                      time.sleep(5)
              return "⚠️ AI 点评暂时不可用"

          # ================== 1. 国内新闻40条 ==================
          def domestic_news():
              news = []
              sites = [
                  ("https://www.stcn.com/", "证券时报"),
                  ("https://www.cs.com.cn/", "中国证券报"),
                  ("https://finance.eastmoney.com/", "东方财富"),
                  ("https://www.cls.cn/", "财联社"),
              ]
              for url, name in sites:
                  try:
                      r = requests.get(url, headers=headers, timeout=10, verify=False)
                      r.encoding = "utf-8"
                      soup = BeautifulSoup(r.text, "lxml")
                      for a in soup.find_all("a"):
                          t = a.get_text(strip=True)
                          if 15 < len(t) < 85 and "视频" not in t and "直播" not in t:
                              news.append(f"【{name}】{t}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 2. 国际新闻40条 ==================
          def global_news():
              news = []
              sites = [
                  ("https://www.reuters.com/business", "路透社"),
                  ("https://www.bbc.com/news/business", "BBC"),
                  ("https://www.bloomberg.com/markets", "彭博"),
                  ("https://www.cnbc.com/economy/", "CNBC"),
              ]
              for url, name in sites:
                  try:
                      r = requests.get(url, headers=headers, timeout=10)
                      soup = BeautifulSoup(r.text, "lxml")
                      for h in soup.find_all(["h2","h3","h4"]):
                          t = h.get_text(strip=True)
                          if 15 < len(t) < 85:
                              news.append(f"【{name}】{t}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 3. 当月分红 ≥4% ==================
          def dividends():
              res = []
              try:
                  df = ak.stock_dividend_cninfo()
                  df["公告日期"] = pd.to_datetime(df["公告日期"], errors="coerce")
                  df = df[df["公告日期"] >= START_DATE]
                  price_df = ak.stock_zh_a_spot_em().set_index("代码")
                  for _, row in df.iterrows():
                      code = row["代码"]
                      name = row["名称"]
                      div = pd.to_numeric(row["每股派息"], errors="coerce")
                      if pd.isna(div) or div <= 0:
                          continue
                      if code not in price_df.index:
                          continue
                      p = price_df.loc[code, "最新"]
                      if p <= 0:
                          continue
                      rate = round((div / p) * 100, 2)
                      if rate >= 4:
                          tag = "🔥" if rate >=5 else ""
                          res.append(f"{code} {name} | 派息:{div}元 | 股息率:{rate}%{tag}")
              except Exception as e:
                  print("分红数据获取失败:", e)
              return list(dict.fromkeys(res))[:30]

          # ================== 4. 个股利好利空 ==================
          def stock_news():
              good = []
              bad = []
              try:
                  df = ak.stock_news_em(symbol="")
                  df["发布时间"] = pd.to_datetime(df["发布时间"], errors="coerce")
                  df = df[df["发布时间"] >= START_DATE]
                  for _, row in df.iterrows():
                      code = row["股票代码"]
                      name = row["股票简称"]
                      title = row["标题"]
                      if not code or len(code)!=6:
                          continue
                      if any(x in title for x in ["涨停", "利好", "增长", "中标", "回购", "增持", "获批"]):
                          good.append(f"{code} {name}｜{title}")
                      if any(x in title for x in ["跌停", "亏损", "处罚", "立案", "减持", "风险", "暴跌"]):
                          bad.append(f"{code} {name}｜{title}")
              except Exception as e:
                  print("个股新闻获取失败:", e)
              return good[:20], bad[:20]

          # ================== 5. 国际黄金 & 原油价格 ==================
          def get_commodity_prices():
              try:
                  gold_df = ak.futures_global_comm(symbol="XAU")
                  gold_price = round(gold_df.iloc[-1]["最新价"], 2)
                  gold_chg = round(gold_df.iloc[-1]["涨跌幅"], 2)
                  oil_df = ak.futures_global_comm(symbol="BZ")
                  oil_price = round(oil_df.iloc[-1]["最新价"], 2)
                  oil_chg = round(oil_df.iloc[-1]["涨跌幅"], 2)
                  return {
                      "gold": {"price": gold_price, "chg": gold_chg},
                      "oil": {"price": oil_price, "chg": oil_chg}
                  }
              except Exception as e:
                  print("大宗商品价格获取失败:", e)
                  return None

          # ================== 主执行 ==================
          if __name__ == "__main__":
              # 1. 国内新闻（40条完整推送）
              dom = domestic_news()
              t1 = [f"📢【国内财经大新闻 40条 {TODAY}】"]
              for i, n in enumerate(dom[:40],1):
                  t1.append(f"{i}. {n}")
              send("\n".join(t1))
              time.sleep(2)

              # 2. 国际新闻（40条完整推送）
              glo = global_news()
              t2 = [f"🌍【国际财经大新闻 40条 {TODAY}】"]
              for i, n in enumerate(glo[:40],1):
                  t2.append(f"{i}. {n}")
              send("\n".join(t2))
              time.sleep(2)

              # 3. AI 全球市场评述（仅1次调用）
              if glo:
                  gtext = "\n".join(glo[:12])
                  aicom = ai_summary(f"""
                  请对以下国际财经新闻做专业总结：
                  1. 今日核心趋势
                  2. 对全球股市/商品影响
                  3. 简短观点
                  新闻：{gtext}
                  """)
                  send(f"🤖【Gemini 全球市场今日评述】\n{aicom}")
                  time.sleep(3)

              # 4. 当月高分红
              divs = dividends()
              t3 = [f"💰【{YEAR}年{MONTH}月 高股息分红 ≥4%（官方巨潮）】"]
              if divs:
                  for i, item in enumerate(divs,1):
                      t3.append(f"{i}. {item}")
              else:
                  t3.append("暂无符合条件公告")
              send("\n".join(t3))
              time.sleep(2)

              # 5. 个股利好利空
              good, bad = stock_news()
              t4 = [f"✅【沪深A股 个股利好（本月）】"]
              for i, it in enumerate(good[:15],1):
                  t4.append(f"{i}. {it}")
              send("\n".join(t4))
              time.sleep(2)

              t5 = [f"⚠️【沪深A股 个股利空（本月）】"]
              for i, it in enumerate(bad[:15],1):
                  t5.append(f"{i}. {it}")
              send("\n".join(t5))
              time.sleep(2)

              # 6. AI 个股事件点评
              if good or bad:
                  gtext2 = "\n".join(good[:6] + bad[:6])
                  aicom2 = ai_summary(f"""
                  以下是A股个股利好利空，请点评：
                  1. 整体情绪
                  2. 机会与风险
                  3. 哪些类型事件最多
                  内容：{gtext2}
                  """)
                  send(f"🤖【Gemini 个股事件点评】\n{aicom2}")
                  time.sleep(3)

              # 7. 国际黄金 & 原油价格（修复语法错误）
              comm = get_commodity_prices()
              if comm:
                  gold = comm["gold"]
                  oil = comm["oil"]
                  t6 = [
                      f"🏆【国际大宗商品实时价格 {TODAY}】",
                      f"• 伦敦金现：{gold['price']} 美元/盎司 | 涨跌幅：{gold['chg']}%",
                      f"• 布伦特原油：{oil['price']} 美元/桶 | 涨跌幅：{oil['chg']}%"
                  ]
                  send("\n".join(t6))
                  time.sleep(2)

                  # AI 走势预判
                  aicom3 = ai_summary(f"""
                  当前国际黄金价格：{gold['price']} 美元/盎司，涨跌幅：{gold['chg']}%
                  当前布伦特原油价格：{oil['price']} 美元/桶，涨跌幅：{oil['chg']}%
                  结合当前全球宏观环境，请分析：
                  1. 黄金和原油各自的短期（1-2周）走势逻辑
                  2. 核心驱动因素
                  3. 对后续价格的预判和操作建议
                  请简洁专业，控制在200字以内。
                  """)
                  send(f"🤖【Gemini 黄金/原油走势预判】\n{aicom3}")
          EOF
