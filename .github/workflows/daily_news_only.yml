name: 国内40+国际40·翻译+点评·黄金原油必推·个股分析【终极稳定版】

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 8:00
    - cron: '0 4 * * 1-5'   # 12:00
    - cron: '0 10 * * 1-5'  # 18:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖（强制更新 AKShare 到最新版）
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml fake-useragent google-generativeai akshare pandas

      - name: 执行推送
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -u << 'EOF'
          import requests, time, akshare as ak, pandas as pd
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          import google.generativeai as genai

          # ================== 配置 ==================
          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          GEMINI_KEY = "${{ secrets.GEMINI_API_KEY }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          MONTH = datetime.now().month
          YEAR = datetime.now().year
          START_DATE = f"{YEAR}-{MONTH:02d}-01"
          headers = {"User-Agent": UserAgent().random}

          # Gemini 初始化
          genai.configure(api_key=GEMINI_KEY)
          gemini = genai.GenerativeModel("gemini-1.5-flash", generation_config={"temperature": 0.4})

          # ================== 飞书发送 ==================
          def send(text):
              try:
                  requests.post(WEBHOOK, json={"msg_type": "text", "content": {"text": text[:3000]}}, timeout=20)
                  time.sleep(3)
              except Exception as e:
                  print("发送失败:", e)

          # ================== AI 处理（翻译+点评） ==================
          def ai_process(prompt):
              for _ in range(3):
                  try:
                      res = gemini.generate_content(prompt, request_options={"timeout": 60})
                      return res.text.strip() if res.text else "AI 服务暂时不可用"
                  except:
                      time.sleep(6)
              return "⚠️ AI 处理失败"

          # ================== 1. 国内新闻40条 ==================
          def domestic_news():
              news = []
              sites = [("https://www.stcn.com/", "证券时报"), ("https://www.cs.com.cn/", "中国证券报"),
                       ("https://finance.eastmoney.com/", "东方财富"), ("https://www.cls.cn/", "财联社")]
              for url, name in sites:
                  try:
                      r = requests.get(url, headers=headers, timeout=10, verify=False)
                      r.encoding = "utf-8"
                      soup = BeautifulSoup(r.text, "lxml")
                      for a in soup.find_all("a"):
                          t = a.get_text(strip=True)
                          if 15 < len(t) < 85 and "视频" not in t and "直播" not in t:
                              news.append(f"【{name}】{t}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 2. 国际新闻40条（精准翻译） ==================
          def global_news_with_translate():
              raw_news = []
              sites = [("https://www.reuters.com/business", "路透社"), ("https://www.bbc.com/news/business", "BBC"),
                       ("https://www.bloomberg.com/markets", "彭博"), ("https://www.cnbc.com/economy/", "CNBC")]
              for url, name in sites:
                  try:
                      r = requests.get(url, headers=headers, timeout=10)
                      soup = BeautifulSoup(r.text, "lxml")
                      for h in soup.find_all(["h2", "h3", "h4"]):
                          t = h.get_text(strip=True)
                          if 15 < len(t) < 85:
                              raw_news.append(f"【{name}】{t}")
                  except:
                      continue
              raw_news = list(dict.fromkeys(raw_news))[:40]
              
              # 批量翻译
              if not raw_news:
                  return ["暂无国际新闻"]
              translate_prompt = f"精准翻译以下财经新闻到中文，保留【来源】，术语准确：\n{chr(10).join(raw_news)}"
              translated = ai_process(translate_prompt)
              translated_list = [line.strip() for line in translated.split("\n") if line.strip() and "【" in line]
              return translated_list[:40] if translated_list else raw_news

          # ================== 3. 国际新闻点评 ==================
          def global_news_comment(news_list):
              if len(news_list) < 5:
                  return "新闻数量不足，暂不点评"
              comment_prompt = f"提炼以下新闻的3-4个核心主题，每个主题1句点评，最后1句市场启示，300字内：\n{chr(10).join(news_list[:20])}"
              return ai_process(comment_prompt)

          # ================== 4. 当月分红 ≥4% ==================
          def dividends():
              res = []
              try:
                  df = ak.stock_dividend_cninfo()
                  df["公告日期"] = pd.to_datetime(df["公告日期"], errors="coerce")
                  df = df[df["公告日期"] >= START_DATE]
                  price_df = ak.stock_zh_a_spot_em().set_index("代码")
                  for _, row in df.iterrows():
                      code = row["代码"]
                      name = row["名称"]
                      div = pd.to_numeric(row["每股派息"], errors="coerce")
                      if pd.isna(div) or div <= 0 or code not in price_df.index:
                          continue
                      p = price_df.loc[code, "最新"]
                      rate = round((div/p)*100,2)
                      if rate >=4:
                          res.append(f"{code} {name} | 派息:{div}元 | 股息率:{rate}%")
              except:
                  pass
              return res[:30]

          # ================== 5. 个股利好利空 ==================
          def stock_news():
              good, bad = [], []
              try:
                  df = ak.stock_news_em("")
                  df["发布时间"] = pd.to_datetime(df["发布时间"], errors="coerce")
                  df = df[df["发布时间"] >= START_DATE]
                  for _, row in df.iterrows():
                      code = row["股票代码"]
                      name = row["股票简称"]
                      title = row["标题"]
                      if not code or len(code)!=6:
                          continue
                      if any(x in title for x in ["利好", "增长", "中标", "回购", "增持"]):
                          good.append(f"{code} {name}｜{title}")
                      if any(x in title for x in ["亏损", "处罚", "立案", "减持", "风险"]):
                          bad.append(f"{code} {name}｜{title}")
              except:
                  pass
              return good[:20], bad[:20]

          # ================== 6. 黄金 & 原油（双接口备份+强制重试，必推成功） ==================
          def get_gold_oil_price():
              gold_price, gold_chg = None, None
              oil_price, oil_chg = None, None

              # 尝试主接口（3次重试）
              for _ in range(3):
                  try:
                      # 黄金（伦敦金现）
                      gold_df = ak.futures_global_comm(symbol="XAU")
                      gold_price = round(gold_df.iloc[-1]["最新价"], 2)
                      gold_chg = round(gold_df.iloc[-1]["涨跌幅"], 2)
                      # 原油（布伦特）
                      oil_df = ak.futures_global_comm(symbol="BZ")
                      oil_price = round(oil_df.iloc[-1]["最新价"], 2)
                      oil_chg = round(oil_df.iloc[-1]["涨跌幅"], 2)
                      if all([gold_price, oil_price]):
                          break  # 成功则退出重试
                  except Exception as e:
                      print(f"主接口重试 {_+1} 次失败:", e)
                      time.sleep(4)

              # 主接口失败，切换备用接口（新浪财经，国内网络稳定）
              if not gold_price or not oil_price:
                  try:
                      # 备用接口：黄金
                      gold_sina = ak.commodity_price_historical(symbol="黄金", period="daily")
                      gold_price = round(gold_sina.iloc[-1]["收盘"], 2)
                      gold_chg = round(((gold_sina.iloc[-1]["收盘"] - gold_sina.iloc[-2]["收盘"])/gold_sina.iloc[-2]["收盘"])*100, 2)
                      # 备用接口：原油
                      oil_sina = ak.commodity_price_historical(symbol="布伦特原油", period="daily")
                      oil_price = round(oil_sina.iloc[-1]["收盘"], 2)
                      oil_chg = round(((oil_sina.iloc[-1]["收盘"] - oil_sina.iloc[-2]["收盘"])/oil_sina.iloc[-2]["收盘"])*100, 2)
                  except Exception as e:
                      print("备用接口失败:", e)

              # 最终兜底：确保有数据可推
              if not gold_price:
                  gold_price = "获取中"
                  gold_chg = "0.00"
              if not oil_price:
                  oil_price = "获取中"
                  oil_chg = "0.00"

              return {
                  "gold": gold_price, "gold%": gold_chg,
                  "oil": oil_price, "oil%": oil_chg
              }

          # ================== 主执行 ==================
          if __name__ == "__main__":
              # 1. 国内新闻
              dom = domestic_news()
              t1 = [f"📢【国内财经大新闻 40条 {TODAY}】"]
              for i, n in enumerate(dom[:40],1):
                  t1.append(f"{i}. {n}")
              send("\n".join(t1))
              time.sleep(2)

              # 2. 国际新闻（翻译）
              glo_trans = global_news_with_translate()
              t2 = [f"🌍【国际财经大新闻 40条（中文）{TODAY}】"]
              for i, n in enumerate(glo_trans[:40],1):
                  t2.append(f"{i}. {n}")
              send("\n".join(t2))
              time.sleep(2)

              # 3. 国际新闻点评
              if len(glo_trans) > 3:
                  send(f"🤖【Gemini 国际新闻点评】\n{global_news_comment(glo_trans)}")
                  time.sleep(3)

              # 4. 分红 + 个股
              divs = dividends()
              send(f"💰【{YEAR}年{MONTH}月高股息 ≥4%】\n" + ("\n".join(divs) if divs else "暂无"))
              time.sleep(2)

              good, bad = stock_news()
              send(f"✅【个股利好】\n" + ("\n".join(good[:15]) if good else "暂无"))
              send(f"⚠️【个股利空】\n" + ("\n".join(bad[:15]) if bad else "暂无"))
              time.sleep(2)

              # 5. 黄金原油（修复语法错误，必推）
              comm = get_gold_oil_price()
              price_text = (
                  f"🏆【国际黄金&原油实时价格 {TODAY}】\n"
                  f"伦敦金现：{comm['gold']} 美元/盎司 | 涨跌幅：{comm['gold%']}%\n"
                  f"布伦特原油：{comm['oil']} 美元/桶 | 涨跌幅：{comm['oil%']}%"
              )
              send(price_text)
              time.sleep(2)

              # 6. 黄金原油点评
              if comm['gold'] != "获取中" and comm['oil'] != "获取中":
                  comm_prompt = f"黄金{comm['gold']}美元，原油{comm['oil']}美元，分析短期走势、驱动因素，给1句操作建议，150字内"
                  send(f"🤖【黄金原油走势预判】\n{ai_process(comm_prompt)}")
              else:
                  send("🤖【黄金原油走势预判】\n当前数据暂时不稳定，建议关注地缘政治和供需变化")
          EOF
