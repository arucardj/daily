name: 国内40+国际40·当月分红≥4%·新闻完整清晰【全自动】

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml fake-useragent translate akshare pandas

      - name: 执行推送
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 -u << 'EOF'
          import requests, time, akshare as ak, pandas as pd
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator

          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          translator = Translator(to_lang="zh")
          headers = {"User-Agent": UserAgent().random}

          def send_msg(text):
              try:
                  requests.post(WEBHOOK, json={"msg_type":"text","content":{"text":text}}, timeout=25)
                  time.sleep(3)
              except Exception as e:
                  print(f"发送失败: {e}")

          # ================== 1. 国内新闻 40条（完整标题+清晰易懂+来源） ==================
          def get_domestic_news():
              news = []
              sources = [
                  ("https://www.cls.cn/", "财联社"),
                  ("https://www.stcn.com/", "证券时报"),
                  ("https://finance.sina.com.cn/macro/", "新浪财经"),
                  ("https://quote.eastmoney.com/news/", "东方财富"),
                  ("https://www.cs.com.cn/", "中国证券报")
              ]
              for url, src in sources:
                  try:
                      r = requests.get(url, headers=headers, timeout=12, verify=False)
                      r.encoding = "utf-8"
                      soup = BeautifulSoup(r.text, "html.parser")
                      for a in soup.find_all("a"):
                          title = a.get_text(strip=True)
                          if 15 < len(title) < 80 and "视频" not in title and "直播" not in title:
                              news.append(f"【{src}】{title}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 2. 国际新闻 40条（翻译+完整+来源：BBC/路透/彭博） ==================
          def get_global_news():
              news = []
              sources = [
                  ("https://www.bbc.com/news/business", "BBC Business"),
                  ("https://www.reuters.com/business/", "路透社"),
                  ("https://www.bloomberg.com/economics", "彭博社"),
                  ("https://www.cnbc.com/economy/", "CNBC"),
                  ("https://www.wsj.com/news/markets", "华尔街日报")
              ]
              for url, name in sources:
                  try:
                      r = requests.get(url, headers=headers, timeout=12)
                      soup = BeautifulSoup(r.text, "html.parser")
                      for h in soup.find_all(["h3","h4",".Card-title"]):
                          title = h.get_text(strip=True)
                          if len(title) < 12:
                              continue
                          try:
                              cn_title = translator.translate(title)
                              news.append(f"【{name}】{cn_title}")
                          except:
                              news.append(f"【{name}】{title}")
                  except:
                      continue
              return list(dict.fromkeys(news))[:40]

          # ================== 3. 当月分红（自动：3月→3.1，4月→4.1，≥4%，降序，官方来源） ==================
          def get_monthly_dividend():
              div_list = []
              try:
                  today = datetime.now()
                  start_date = datetime(today.year, today.month, 1)
                  df = ak.stock_dividend_cninfo()
                  df["公告日期"] = pd.to_datetime(df["公告日期"], errors="coerce")
                  df_month = df[df["公告日期"] >= start_date]

                  spot_df = ak.stock_zh_a_spot_em().set_index("代码")

                  for _, row in df_month.iterrows():
                      code = row["代码"]
                      name = row["名称"]
                      div = pd.to_numeric(row["每股派息"], errors="coerce")
                      if pd.isna(div) or div <= 0:
                          continue
                      if code not in spot_df.index:
                          continue
                      price = spot_df.loc[code, "最新"]
                      if price <= 0:
                          continue
                      rate = round((div / price) * 100, 2)
                      if rate >= 4.0:
                          tag = " 🔥≥5%" if rate >= 5 else ""
                          div_list.append({
                              "code": code,
                              "name": name,
                              "rate": rate,
                              "text": f"{code} {name} | 分红:{div}元 | 股息率:{rate}%{tag}（巨潮资讯）"
                          })

                  div_list = list({item["code"]: item for item in div_list}.values())
                  div_list.sort(key=lambda x: x["rate"], reverse=True)
              except:
                  pass
              return div_list[:20]

          # ================== 主程序 ==================
          if __name__ == "__main__":
              domestic = get_domestic_news()
              send_msg("【国内财经新闻 40条】\n" + "\n".join([f"{i}. {n}" for i, n in enumerate(domestic, 1)]))

              global_news = get_global_news()
              send_msg("【国际财经新闻 40条（BBC/路透/彭博）】\n" + "\n".join([f"{i}. {n}" for i, n in enumerate(global_news, 1)]))

              div_data = get_monthly_dividend()
              month_str = datetime.now().strftime("%Y年%m月")
              part3 = [f"【{month_str} 高股息分红公告（≥4%）】"]
              if div_data:
                  for i, item in enumerate(div_data, 1):
                      part3.append(f"{i}. {item['text']}")
              else:
                  part3.append("暂无符合条件的分红公告")
              send_msg("\n".join(part3))
          EOF
