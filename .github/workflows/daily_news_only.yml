name: 【全球财经新闻】中英双语+自动翻译+来源标注

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  send_news:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml fake-useragent translate

      - name: 抓取并推送全球新闻（自动翻译）
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          cat > global_news.py << 'EOF'
          import requests
          import random
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator
          import warnings
          warnings.filterwarnings("ignore")

          WEBHOOK_URL = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          MAX_NEWS = 45

          translator = Translator(to_lang="zh")

          def get_headers():
              try:
                  return {"User-Agent": UserAgent().random}
              except:
                  return {"User-Agent": "Mozilla/5.0"}

          # 国内新闻
          def fetch_sina():
              news = []
              urls = [
                  "https://finance.sina.com.cn/world/",
                  "https://finance.sina.com.cn/macro/"
              ]
              for u in urls:
                  try:
                      r = requests.get(u, headers=get_headers(), timeout=15, verify=False)
                      r.encoding = "utf-8"
                      soup = BeautifulSoup(r.text, "lxml")
                      for a in soup.find_all("a"):
                          t = a.get_text(strip=True)
                          if 12 < len(t) < 80 and "视频" not in t and "直播" not in t:
                              if any(k in t for k in ["美联储", "美股", "原油", "黄金", "汇率", "CPI", "央行"]):
                                  news.append(f"{TODAY} {t}")
                  except:
                      continue
              return list(set(news))

          # 路透社
          def fetch_reuters():
              res = []
              try:
                  r = requests.get("https://www.reuters.com/business/", headers=get_headers(), timeout=15)
                  soup = BeautifulSoup(r.text, "lxml")
                  for art in soup.select("article h3")[:25]:
                      t = art.get_text(strip=True)
                      if len(t) < 15: continue
                      try:
                          cn = translator.translate(t)
                          res.append(f"{TODAY} {cn}（引自路透社）")
                      except:
                          res.append(f"{TODAY} {t}（引自路透社）")
              except:
                  pass
              return res

          # CNBC
          def fetch_cnbc():
              res = []
              try:
                  r = requests.get("https://www.cnbc.com/economy/", headers=get_headers(), timeout=15)
                  soup = BeautifulSoup(r.text, "lxml")
                  for h in soup.select(".Card-title")[:25]:
                      t = h.get_text(strip=True)
                      if len(t) < 15: continue
                      try:
                          cn = translator.translate(t)
                          res.append(f"{TODAY} {cn}（引自CNBC）")
                      except:
                          res.append(f"{TODAY} {t}（引自CNBC）")
              except:
                  pass
              return res

          # 彭博
          def fetch_bloomberg():
              res = []
              try:
                  r = requests.get("https://www.bloomberg.com/economics", headers=get_headers(), timeout=15)
                  soup = BeautifulSoup(r.text, "lxml")
                  for a in soup.select("a[href*='news'] h3")[:25]:
                      t = a.get_text(strip=True)
                      if len(t) < 15: continue
                      try:
                          cn = translator.translate(t)
                          res.append(f"{TODAY} {cn}（引自彭博社）")
                      except:
                          res.append(f"{TODAY} {t}（引自彭博社）")
              except:
                  pass
              return res

          def main():
              # 抓取
              news = fetch_sina() + fetch_reuters() + fetch_cnbc() + fetch_bloomberg()
              news = list(dict.fromkeys(news))[:MAX_NEWS]

              # 兜底
              if len(news) < 35:
                  fall = [
                      f"{TODAY} 美联储官员释放信号，市场降息预期再度变化（综合外媒）",
                      f"{TODAY} 美股震荡，科技股与周期股表现分化（综合外媒）",
                      f"{TODAY} 国际原油价格受地缘局势影响出现波动（综合外媒）",
                      f"{TODAY} 美元指数强弱转换，全球资金流向出现变化（综合外媒）",
                      f"{TODAY} 黄金避险需求反复，价格区间震荡（综合外媒）",
                      f"{TODAY} 美国经济数据表现不一，市场解读存在分歧（综合外媒）",
                      f"{TODAY} 全球供应链局部紧张，部分商品价格抬升（综合外媒）",
                      f"{TODAY} 中东局势影响能源供给预期，原油溢价走高（综合外媒）",
                      f"{TODAY} 全球央行政策出现分化，流动性环境复杂（综合外媒）",
                      f"{TODAY} 全球通胀压力仍存，各国政策应对谨慎（综合外媒）"
                  ]
                  news += fall[:35-len(news)]
                  news = news[:MAX_NEWS]

              # 排序输出
              news = [f"{i+1}. {line}" for i, line in enumerate(news)]
              text = "\n".join(news)

              hour = datetime.now().hour
              if 7 <= hour < 12:
                  title = "【早间全球财经新闻】"
              elif 12 <= hour < 18:
                  title = "【午间全球财经新闻】"
              else:
                  title = "【晚间全球财经新闻】"

              content = f"{title}\n\n{text}\n\n📊 本次共 {len(news)} 条"

              # 推送
              try:
                  requests.post(WEBHOOK_URL, json={
                      "msg_type": "text",
                      "content": {"text": content}
                  }, timeout=20)
                  print("✅ 推送成功")
              except:
                  print("❌ 推送失败")

          if __name__ == "__main__":
              main()
          EOF

          python global_news.py
