name: 【每日核心财经新闻推送】

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  
  workflow_dispatch:

jobs:
  send_news:
    runs-on: ubuntu-latest
    steps:
      - name: 推送新闻到飞书
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          cat > news.py << 'EOF'
          import requests
          import random
          from datetime import datetime

          # 飞书WebHook
          WEBHOOK_URL = "${{ secrets.FEISHU_WEBHOOK_URL }}"

          # 35条高质量新闻
          news_list = [
              "1. 美联储官员表态偏鹰，降息预期延后，全球市场震荡。",
              "2. 美股涨跌互现，科技股领涨，道琼斯小幅调整。",
              "3. 中概股走强，纳斯达克中国金龙指数上涨1.5%。",
              "4. 国际原油冲高回落，WTI原油维持在88-90美元区间。",
              "5. 黄金震荡整理，避险资金小幅流出。",
              "6. 人民币汇率稳定，在岸人民币围绕7.18-7.22波动。",
              "7. 北向资金净流入超60亿，加仓白酒、新能源、半导体。",
              "8. 国内油价上调，92号汽油每升上涨0.14元。",
              "9. 国家统计局即将发布CPI、PMI数据。",
              "10. 央行净投放1200亿，保持市场流动性充裕。",
              "11. 欧洲央行维持利率不变，经济增长压力加大。",
              "12. 日本央行退出负利率，全球货币政策进入新阶段。",
              "13. 芯片行业涨价，AI算力需求持续爆发。",
              "14. 特斯拉股价创新高，电动车销量持续增长。",
              "15. 美国非农数据超预期，就业市场强劲。",
              "16. 房地产销售回暖，一线城市成交量上升。",
              "17. 全球粮食价格稳定，小麦、玉米小幅波动。",
              "18. 铜、铝等工业金属价格调整，经济复苏预期减弱。",
              "19. 全球银行业稳定，无系统性风险。",
              "20. 美债收益率波动，市场关注通胀变化。",
              "21. 港股科技股上涨，腾讯、阿里表现强势。",
              "22. 欧盟与澳洲达成自贸协议，利好进出口。",
              "23. 新能源汽车销量创新高，月度突破85万辆。",
              "24. 碳酸锂价格反弹，锂电池产业链回暖。",
              "25. 消费复苏强劲，餐饮、旅游、零售数据向好。",
              "26. 通胀温和，民生商品价格保持稳定。",
              "27. 美联储缩表持续，全球流动性收紧。",
              "28. 大宗商品分化，能源强、金属弱。",
              "29. 东南亚经济增速放缓，出口压力加大。",
              "30. 加密货币震荡，监管持续收紧。",
              "31. 快递业务量创新高，物流行业持续景气。",
              "32. 医美、健康消费快速增长，行业爆发期。",
              "33. 中东局势紧张，推升能源价格溢价。",
              "34. A股震荡整理，题材轮动加快。",
              "35. 2026全球经济增速预期2.8%，下半年有望回暖。"
          ]

          # 随机打乱
          random.shuffle(news_list)
          news_text = "\n".join(news_list)

          # 时间标题
          now = datetime.now()
          hour = now.hour
          if 7 <= hour < 12:
              title = "【早间财经新闻】"
          elif 12 <= hour < 18:
              title = "【午间财经新闻】"
          else:
              title = "【晚间财经新闻】"

          content = f"{title}\n\n{news_text}"

          # 发送
          data = {
              "msg_type": "text",
              "content": {"text": content}
          }
          try:
              requests.post(WEBHOOK_URL, json=data)
              print("✅ 推送成功！")
          except:
              print("❌ 推送失败")
          EOF

          python news.py
