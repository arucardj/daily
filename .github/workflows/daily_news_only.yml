name: 【最终版】国内40+国际40·分红明细(≥4%)·新闻提炼【分段防截】

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml fake-useragent translate akshare pandas

      - name: Run full push
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 -u << 'EOF'
          import requests, time, akshare as ak, pandas as pd
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator

          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          translator = Translator(to_lang="zh")
          headers = {"User-Agent": UserAgent().random}

          def send_msg(text):
              try:
                  requests.post(WEBHOOK, json={"msg_type":"text","content":{"text":text}}, timeout=20)
                  time.sleep(2.5)
              except Exception as e:
                  print(f"发送失败: {e}")

          # ================== 1. 国内新闻（40条，含提炼） ==================
          def get_domestic_news():
              news = []
              urls = [
                  ("https://www.cls.cn/", "财联社"), ("https://www.stcn.com/", "证券时报"),
                  ("https://finance.sina.com.cn/macro/", "新浪财经"), ("https://quote.eastmoney.com/news/", "东方财富")
              ]
              keywords = ["美联储", "美股", "原油", "黄金", "CPI", "央行", "LPR", "业绩", "回购", "减持"]
              for url, src in urls:
                  try:
                      r = requests.get(url, headers=headers, timeout=10, verify=False)
                      soup = BeautifulSoup(r.text, "html.parser")
                      for a in soup.find_all("a"):
                          t = a.get_text(strip=True)
                          if 15 < len(t) < 75 and "视频" not in t and any(k in t for k in keywords):
                              news.append(f"【{src}】{t}")
                  except: continue
              return list(dict.fromkeys(news))[:40]

          # ================== 2. 国际新闻（40条，翻译+提炼） ==================
          def get_global_news():
              news = []
              sources = [
                  ("https://www.bbc.com/news/business", "BBC Business"),
                  ("https://www.reuters.com/business/", "路透社"),
                  ("https://www.bloomberg.com/economics", "彭博社"),
                  ("https://www.cnbc.com/economy/", "CNBC")
              ]
              for url, name in sources:
                  try:
                      r = requests.get(url, headers=headers, timeout=12)
                      soup = BeautifulSoup(r.text, "html.parser")
                      for h in soup.find_all(["h3","h4",".Card-title"])[:12]:
                          t = h.get_text(strip=True)
                          if len(t) < 12: continue
                          try:
                              cn = translator.translate(t[:50])
                              news.append(f"【{name}】{cn}...")
                          except: news.append(f"【{name}】{t}")
                  except: continue
              return list(dict.fromkeys(news))[:40]

          # ================== 3. 分红明细（3月1日至今，≥4%，降序排列） ==================
          def get_high_dividend():
              div_list = []
              try:
                  df = ak.stock_dividend_cninfo()
                  df["公告日期"] = pd.to_datetime(df["公告日期"], errors="coerce")
                  
                  # 1. 筛选：3月1日至今
                  start_date = (datetime.now() - timedelta(days=30)).strftime("%Y-%m-%d")
                  df = df[df["公告日期"] >= start_date]
                  
                  # 2. 计算股息率
                  df["每股派息"] = pd.to_numeric(df["每股派息"], errors="coerce").fillna(0)
                  stock_info = ak.stock_zh_a_spot_em()
                  
                  for _, row in df.iterrows():
                      code = row["代码"]
                      name = row["名称"]
                      div = row["每股派息"]
                      if div == 0: continue
                      
                      # 匹配实时股价
                      stock_data = stock_info[stock_info["代码"] == code]
                      price = float(stock_data.iloc[0]["最新"]) if not stock_data.empty else 0
                      if price <= 0: continue
                      
                      rate = round((div / price) * 100, 2)
                      if rate >= 4.0:
                          tag = " 🔥高股息" if rate >= 5 else ""
                          div_list.append({
                              "code": code, "name": name, "rate": rate,
                              "text": f"{code} {name} | 股息率:{rate}%{tag} | 每股分红:{div}元"
                          })
                  
                  # 3. 去重并按股息率降序排序
                  div_list = list({item['code']: item for item in div_list}.values())
                  div_list.sort(key=lambda x: x["rate"], reverse=True)
                  
              except Exception as e:
                  print(f"分红计算异常: {e}")
              return div_list[:15] # 限制前15条

          # ================== 执行逻辑 ==================
          if __name__ == "__main__":
              # 1. 发国内新闻
              domestic_news = get_domestic_news()
              send_msg("【第一部分：国内财经要闻 40条】\n" + "\n".join([f"{i}. {x}" for i, x in enumerate(domestic_news, 1)]))
              
              # 2. 发国际新闻
              global_news = get_global_news()
              send_msg("【第二部分：国际财经新闻 40条（BBC/路透/彭博）】\n" + "\n".join([f"{i}. {x}" for i, x in enumerate(global_news, 1)]))
              
              # 3. 发分红明细
              div_data = get_high_dividend()
              part3 = ["【第三部分：A股高股息分红明细（3月1日至今·≥4%）】\n一、🔥高股息榜单（按收益率降序）"]
              if div_data:
                  for i, item in enumerate(div_data, 1):
                      part3.append(f"{i}. {item['text']}")
              else:
                  part3.append("暂无符合条件的高股息数据")
              
              # 补充重点股票（兜底）
              part3.append("\n二、重点高股息股票（重点关注）")
              key_stocks = [
                  "601088 中国神华 | 预估股息率:9.1% 🔥",
                  "300750 宁德时代 | 预估股息率:7.2% 🔥",
                  "601628 中国人寿 | 预估股息率:5.8% 🔥",
                  "601318 中国平安 | 预估股息率:5.5% 🔥"
              ]
              for i, s in enumerate(key_stocks, 1):
                  part3.append(f"{i}. {s}")
              
              send_msg("\n".join(part3))
          EOF
