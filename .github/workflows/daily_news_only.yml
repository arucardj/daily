name: 全球财经+A股分红监控【分段发送】

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml fake-useragent translate akshare

      - name: Run news & dividend push
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python3 -u << 'EOF'
          import requests
          from datetime import datetime
          from bs4 import BeautifulSoup
          from fake_useragent import UserAgent
          from translate import Translator
          import akshare as ak
          import time

          WEBHOOK = "${{ secrets.FEISHU_WEBHOOK_URL }}"
          TODAY = datetime.now().strftime("%Y-%m-%d")
          translator = Translator(to_lang="zh")

          ua = UserAgent()
          headers = {"User-Agent": ua.random}

          def send_msg(text):
              try:
                  requests.post(WEBHOOK, json={
                      "msg_type": "text",
                      "content": {"text": text}
                  }, timeout=15)
              except:
                  pass

          # ================== 第一条：全球新闻 ==================
          news = []

          # 新浪
          try:
              r = requests.get("https://finance.sina.com.cn/world/", headers=headers, timeout=10, verify=False)
              r.encoding = "utf-8"
              soup = BeautifulSoup(r.text, "html.parser")
              for a in soup.find_all("a"):
                  t = a.get_text(strip=True)
                  if 12 < len(t) < 60 and "视频" not in t and "直播" not in t:
                      if any(k in t for k in ["美联储", "美股", "原油", "黄金", "汇率", "CPI", "央行"]):
                          news.append(f"{TODAY} {t}")
          except:
              pass

          # 路透
          try:
              r = requests.get("https://www.reuters.com/business/", headers=headers, timeout=10)
              soup = BeautifulSoup(r.text, "html.parser")
              for h in soup.select("article h3")[:8]:
                  t = h.get_text(strip=True)
                  if len(t) < 15: continue
                  try:
                      cn = translator.translate(t)
                      news.append(f"{TODAY} {cn}（引自路透社）")
                  except:
                      news.append(f"{TODAY} {t}（引自路透社）")
          except:
              pass

          # CNBC
          try:
              r = requests.get("https://www.cnbc.com/economy/", headers=headers, timeout=10)
              soup = BeautifulSoup(r.text, "html.parser")
              for h in soup.select(".Card-title")[:8]:
                  t = h.get_text(strip=True)
                  if len(t) < 15: continue
                  try:
                      cn = translator.translate(t)
                      news.append(f"{TODAY} {cn}（引自CNBC）")
                  except:
                      news.append(f"{TODAY} {t}（引自CNBC）")
          except:
              pass

          # 彭博
          try:
              r = requests.get("https://www.bloomberg.com/economics", headers=headers, timeout=10)
              soup = BeautifulSoup(r.text, "html.parser")
              for a in soup.select("a[href*='news'] h3")[:8]:
                  t = a.get_text(strip=True)
                  if len(t) < 15: continue
                  try:
                      cn = translator.translate(t)
                      news.append(f"{TODAY} {cn}（引自彭博社）")
                  except:
                      news.append(f"{TODAY} {t}（引自彭博社）")
          except:
              pass

          news = list(dict.fromkeys(news))[:25]
          hour = datetime.now().hour
          if 7 <= hour < 12:
              title = "【早间全球财经新闻】"
          elif 12 <= hour < 18:
              title = "【午间全球财经新闻】"
          else:
              title = "【晚间全球财经新闻】"

          part1 = [title]
          for i, n in enumerate(news, 1):
              part1.append(f"{i}. {n}")

          send_msg("\n".join(part1))
          time.sleep(3)

          # ================== 第二条：分红 + 利好利空 ==================
          part2 = ["【A股分红·高股息·个股利好利空】\n"]

          # 分红
          div_lines = []
          try:
              df = ak.stock_dividend_cninfo()
              today_df = df[df["公告日期"] == TODAY]
              for _, row in today_df.iterrows():
                  code = row["代码"]
                  name = row["名称"]
                  div = str(row["每股派息"]).replace("元", "")
                  try:
                      price_df = ak.stock_zh_a_spot_em(symbol=code)
                      price = float(price_df.iloc[0]["最新"])
                      rate = round(float(div) / price * 100, 2)
                      tag = " 🔥高股息≥5%" if rate >= 5 else ""
                      div_lines.append(f"{code} {name} | 分红:{div}元 | 股息率:{rate}%{tag}（巨潮资讯）")
                  except:
                      div_lines.append(f"{code} {name} | 分红:{div}元（巨潮资讯）")
          except:
              pass

          part2.append("一、🔥最新分红公告")
          part2.extend(div_lines[:8] if div_lines else ["今日暂无分红公告"])

          # 利好利空
          good = []
          bad = []
          try:
              news_df = ak.stock_news_em()
              for _, row in news_df.iterrows():
                  t = row["标题"]
                  s = row["来源"]
                  item = f"{t}（来源:{s}）"
                  if len(good) < 6 and any(k in t for k in ["预增", "回购", "增持", "中标", "合同", "获批"]):
                      good.append(f"【利好】{item}")
                  if len(bad) < 6 and any(k in t for k in ["减持", "亏损", "问询", "风险", "诉讼", "立案"]):
                      bad.append(f"【利空】{item}")
          except:
              pass

          part2.append("\n二、个股利好")
          part2.extend(good if good else ["暂无"])
          part2.append("\n三、个股利空")
          part2.extend(bad if bad else ["暂无"])

          send_msg("\n".join(part2))
          EOF
