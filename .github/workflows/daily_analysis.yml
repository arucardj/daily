name: 全维度股市&个股智能分析(飞书推送)

on:
  # GitHub Actions cron 是UTC时间，换算北京时间：
  # 北京08:00 → UTC00:00
  # 北京12:00 → UTC04:00
  # 北京18:00 → UTC10:00
  schedule:
    - cron: '0 0 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '0 10 * * 1-5'
  # 手动触发
  workflow_dispatch:
    inputs:
      force_run:
        description: 强制运行(跳过交易日检测)
        required: false
        default: false
        type: boolean

# 并发只跑一个
concurrency:
  group: stock-full-analysis
  cancel-in-progress: false

jobs:
  analyze-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置Python3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必需目录
        run: mkdir -p data logs reports

      - name: 全维度股市+个股+均线+BOLL+资金流分析(仅Gemini+飞书通知)
        env:
          # ========== 核心AI：仅Gemini做智能总结分析 ==========
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          GEMINI_MODEL_FALLBACK: gemini-2.5-flash
          GEMINI_REQUEST_DELAY: 3.0

          # ========== 行情数据源必需 ==========
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

          # ========== 仅保留【飞书通知】 ==========
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

          # ========== 自选股 & 市场区域 ==========
          STOCK_LIST: ${{ vars.STOCK_LIST || '601012,000636' }}
          MARKET_REVIEW_REGION: cn

          # ========== 开启全维度数据分析 ==========
          REPORT_TYPE: detailed                  # 详细完整版报告
          SINGLE_STOCK_NOTIFY: true             # 个股单独推送
          MARKET_REVIEW_ENABLED: true           # 大盘复盘开启
          TRADING_DAY_CHECK_ENABLED: true       # 非交易日不运行
          ANALYSIS_DELAY: 0

          # 资金流 / 主力 / 筹码 / 龙虎 / 北向
          ENABLE_CHIP_DISTRIBUTION: true        # 筹码分布
          ENABLE_MAIN_CAPITAL: true             # 主力资金
          CAPITAL_FLOW_PERIOD: 30               # 30日资金流向
          ENABLE_LONGHU: true                   # 龙虎榜
          ENABLE_NORTH_CAPITAL: true            # 北向资金
          CAPITAL_ALERT_THRESHOLD: 500

          # 均线、BOLL指标内置代码计算，项目已自带输出买卖建议
          # ========== 系统配置 ==========
          LOG_LEVEL: INFO
          MAX_WORKERS: 1
          REALTIME_SOURCE_PRIORITY: tencent,akshare_sina,efinance,akshare_em

        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 强制运行模式已开启"
          fi

          echo "====================================="
          echo "🚀 全维度大盘+个股 | 均线+BOLL+资金流+筹码+北向+龙虎"
          echo "⏰ 北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "====================================="

          python main.py ${FORCE_RUN_ARG}

      - name: 上传报告&日志
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: full-stock-report-logs-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 运行收尾查看
        if: always()
        run: |
          echo -e "\n================ 运行结束 ================"
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "✅ 已生成完整分析报告(含均线/BOLL/资金/个股/大盘)"
            ls -la reports/
          else
            echo "⚠️ 未生成报告，请检查密钥/数据源/今日是否交易日"
          fi
